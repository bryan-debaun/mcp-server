services:
  - type: web
    name: mcp-server
    env: docker
    plan: starter
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build && pnpm exec prisma migrate deploy && pnpm run prisma:seed
    startCommand: pnpm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
    healthCheckPath: /healthz
